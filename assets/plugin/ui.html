<!DOCTYPE html>
<html>

<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 48px;
      height: 48px;
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bubble {
      width: 48px;
      height: 48px;
      border-radius: 24px;
      background: #161618;
      border: 1.5px solid #2a2a2e;
      cursor: pointer;
      user-select: none;
      position: relative;
      overflow: hidden;
      transition:
        width 0.32s cubic-bezier(0.34, 1.4, 0.64, 1),
        height 0.32s cubic-bezier(0.34, 1.4, 0.64, 1),
        border-radius 0.32s cubic-bezier(0.34, 1.4, 0.64, 1),
        border-color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Ring color reacts to state */
    .bubble.connecting {
      border-color: rgba(245, 158, 11, 0.45);
    }

    .bubble.connected {
      border-color: rgba(34, 197, 94, 0.45);
    }

    .bubble.error {
      border-color: rgba(239, 68, 68, 0.45);
    }

    .bubble.expanded {
      width: 192px;
      height: 76px;
      border-radius: 14px;
    }

    /* ── Collapsed: just the status dot ── */
    .solo-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #444;
      transition: background 0.25s, opacity 0.2s, transform 0.2s;
      flex-shrink: 0;
    }

    .bubble.expanded .solo-dot {
      opacity: 0;
      transform: scale(0);
      position: absolute;
      pointer-events: none;
    }

    /* ── Expanded: full card content ── */
    .card {
      position: absolute;
      inset: 0;
      padding: 13px 15px 11px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease;
    }

    .bubble.expanded .card {
      opacity: 1;
      transition: opacity 0.2s ease 0.14s;
      pointer-events: auto;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
      transition: background 0.25s;
    }

    .title {
      font-family: Inter, -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: #e8e8e8;
      letter-spacing: 0.01em;
    }

    #status-text {
      font-family: Inter, -apple-system, sans-serif;
      font-size: 10px;
      color: #777;
      padding-left: 14px;
    }

    .hint {
      font-family: Inter, -apple-system, sans-serif;
      font-size: 9px;
      color: #3a3a3e;
      padding-left: 14px;
    }

    /* State colors */
    .dot-connecting {
      background: #f59e0b;
      animation: pulse 1.2s infinite;
    }

    .dot-connected {
      background: #22c55e;
    }

    .dot-error {
      background: #ef4444;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.35;
      }
    }
  </style>
</head>

<body>
  <div class="bubble connecting" id="bubble">

    <!-- Collapsed: single dot -->
    <div class="solo-dot dot-connecting" id="solo"></div>

    <!-- Expanded: card -->
    <div class="card">
      <div class="title-row">
        <div class="status-dot dot-connecting" id="dot"></div>
        <span class="title">Figma CLI</span>
      </div>
      <span id="status-text">Connecting…</span>
      <span class="hint">Keep this window open</span>
    </div>

  </div>

  <script>
    const bubble = document.getElementById('bubble');
    const solo = document.getElementById('solo');
    const dot = document.getElementById('dot');
    const statusEl = document.getElementById('status-text');
    let expanded = false;

    // ── Toggle expand / collapse ──────────────────────────────────────────
    bubble.addEventListener('click', () => {
      expanded = !expanded;
      bubble.classList.toggle('expanded', expanded);
      parent.postMessage({
        pluginMessage: {
          type: 'resize',
          width: expanded ? 192 : 48,
          height: expanded ? 76 : 48,
        }
      }, '*');
    });

    // ── Status helper ─────────────────────────────────────────────────────
    function setStatus(text, state) {
      statusEl.textContent = text;
      // state: 'connecting' | 'connected' | 'error'
      const cls = 'dot-' + state;
      solo.className = 'solo-dot ' + cls;
      dot.className = 'status-dot ' + cls;
      bubble.className = 'bubble' + (expanded ? ' expanded' : '') + ' ' + state;
    }

    // ── WebSocket bridge (logic unchanged) ────────────────────────────────
    const PORTS = [3456, 3457, 3458, 3459, 3460];
    let ws = null, reconnectTimer = null, keepaliveTimer = null, lastPong = Date.now();

    function connectParallel() {
      if (ws && ws.readyState === WebSocket.OPEN) return;
      setStatus('Scanning…', 'connecting');
      let connected = false;
      const attempts = [];

      PORTS.forEach(port => {
        try {
          const socket = new WebSocket(`ws://127.0.0.1:${port}/plugin`);
          attempts.push(socket);
          socket.onopen = () => {
            if (connected) { socket.close(); return; }
            connected = true;
            ws = socket;
            attempts.forEach(s => {
              if (s !== socket) { s.onclose = null; s.onerror = null; try { s.close(); } catch { } }
            });
            ws.onmessage = handleMessage;
            ws.onclose = handleClose;
            ws.onerror = handleClose;
            setStatus('Connected', 'connected');
            parent.postMessage({ pluginMessage: { type: 'connected' } }, '*');
            ws.send(JSON.stringify({ type: 'hello', mode: 'plugin', version: '1.3.0' }));
            startKeepalive();
          };
          socket.onclose = () => { };
          socket.onerror = () => { };
        } catch (e) { }
      });

      setTimeout(() => {
        if (!connected) {
          attempts.forEach(s => { s.onclose = null; try { s.close(); } catch { } });
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connectParallel, 300);
        }
      }, 1500);
    }

    function handleMessage(event) {
      try {
        const msg = JSON.parse(event.data);
        if (msg.action === 'eval') parent.postMessage({ pluginMessage: { type: 'eval', id: msg.id, code: msg.code } }, '*');
        if (msg.action === 'eval-batch') parent.postMessage({ pluginMessage: { type: 'eval-batch', id: msg.id, codes: msg.codes } }, '*');
        if (msg.action === 'ping') ws.send(JSON.stringify({ type: 'pong', id: msg.id }));
        if (msg.type === 'pong') lastPong = Date.now();
      } catch (e) { }
    }

    function handleClose() {
      if (ws && ws.readyState !== WebSocket.OPEN) {
        ws = null;
        setStatus('Reconnecting…', 'connecting');
        stopKeepalive();
        parent.postMessage({ pluginMessage: { type: 'disconnected' } }, '*');
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connectParallel, 200);
      }
    }

    function startKeepalive() {
      stopKeepalive();
      lastPong = Date.now();
      keepaliveTimer = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          if (Date.now() - lastPong > 8000) { ws.close(); return; }
          ws.send(JSON.stringify({ type: 'ping' }));
        }
      }, 3000);
    }

    function stopKeepalive() {
      if (keepaliveTimer) { clearInterval(keepaliveTimer); keepaliveTimer = null; }
    }

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'result' && ws?.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'result', id: msg.id, result: msg.result, error: msg.error }));
      if (msg.type === 'batch-result' && ws?.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'batch-result', id: msg.id, results: msg.results }));
    };

    connectParallel();
  </script>
</body>

</html>
